sonar.projectKey=spendsmart-frontend
sonar.projectName=SpendSmart Frontend
sonar.projectVersion=1.0.0

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=src/**/*.spec.ts
sonar.exclusions=src/test.ts,src/**/*.d.ts,src/environments/**,**/node_modules/**,**/dist/**,**/coverage/**
sonar.coverage.exclusions=src/main.ts,src/app/app.config.ts,src/environments/**,src/**/*.routes.ts
sonar.cpd.exclusions=src/**/*.spec.ts

sonar.javascript.lcov.reportPaths=coverage/spendsmart-frontend/lcov.info
sonar.typescript.tsconfigPath=tsconfig.json
