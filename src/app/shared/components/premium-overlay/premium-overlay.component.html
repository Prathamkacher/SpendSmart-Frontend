<div
  class="premium-overlay"
  [class.premium-overlay--dashboard]="variant() === 'dashboard'"
  routerLink="/pricing">
  @if (showLock()) {
    <div class="lock-icon" aria-hidden="true">
    <svg viewBox="0 0 24 24" class="lock-icon-svg" fill="none" stroke="currentColor">
      <path
        d="M8 10V7a4 4 0 118 0v3"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="1.8" />
      <rect
        x="6"
        y="10"
        width="12"
        height="10"
        rx="2"
        stroke-linecap="round"
        stroke-linejoin="round"
        stroke-width="1.8" />
      <circle cx="12" cy="15" r="1.2" fill="currentColor" stroke="none" />
    </svg>
    </div>
  }
  <div class="message-container">
    <h3>Premium Feature</h3>
    <p>Unlock advanced insights with SpendSmart Pro.</p>
    <span class="upgrade-link">Click to Upgrade</span>
  </div>
</div>
