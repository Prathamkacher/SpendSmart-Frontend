<div class="p-4 md:p-8 max-w-3xl mx-auto min-h-screen">
  
  <button routerLink="/recurring" class="flex items-center space-x-2 text-slate-400 hover:text-emerald-600 font-bold mb-8 transition-colors group">
    <span class="material-symbols-rounded bg-white p-2 rounded-xl shadow-sm border border-slate-100 group-hover:border-emerald-200 transition-colors">arrow_back</span>
    <span>Back to Automations</span>
  </button>

  <div class="bg-white rounded-[2.5rem] p-8 md:p-12 shadow-sm border border-slate-100 relative overflow-hidden">
    <!-- Decorative background elements -->
    <div class="absolute -top-24 -right-24 w-64 h-64 bg-emerald-50 rounded-full blur-3xl opacity-50 pointer-events-none"></div>
    <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-indigo-50 rounded-full blur-3xl opacity-50 pointer-events-none"></div>

    <div class="relative z-10">
      <div class="mb-10">
        <h1 class="text-3xl font-black text-slate-800 tracking-tight mb-2">{{ isEditMode ? 'Edit Rule' : 'New Automation' }}</h1>
        <p class="text-slate-500 font-medium text-sm">Define how you want to automate this transaction.</p>
      </div>

      <form (ngSubmit)="onSubmit()" #recurringForm="ngForm" class="space-y-8">

        <!-- Transaction Type Toggle -->
        <div class="grid grid-cols-2 gap-4 bg-slate-50 p-2 rounded-2xl">
          <label class="cursor-pointer">
            <input type="radio" name="type" [(ngModel)]="recurring.type" value="EXPENSE" class="peer sr-only">
            <div class="py-4 text-center rounded-xl font-black text-sm transition-all peer-checked:bg-white peer-checked:text-rose-500 peer-checked:shadow-sm text-slate-400">
              <span class="material-symbols-rounded text-sm align-middle mr-2">arrow_downward</span>Expense
            </div>
          </label>
          <label class="cursor-pointer">
            <input type="radio" name="type" [(ngModel)]="recurring.type" value="INCOME" class="peer sr-only">
            <div class="py-4 text-center rounded-xl font-black text-sm transition-all peer-checked:bg-white peer-checked:text-emerald-500 peer-checked:shadow-sm text-slate-400">
              <span class="material-symbols-rounded text-sm align-middle mr-2">arrow_upward</span>Income
            </div>
          </label>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
          <!-- Title -->
          <div class="space-y-3">
          <label for="recurring-title" class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">Automation Title</label>
            <div class="relative">
              <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-rounded text-slate-400">title</span>
              <input id="recurring-title" name="title" [(ngModel)]="recurring.title" required placeholder="e.g. Netflix Subscription" 
                     class="w-full pl-14 pr-6 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-emerald-500/20 text-sm font-bold text-slate-700">
            </div>
          </div>

          <!-- Amount -->
          <div class="space-y-3">
            <label for="recurring-amount" class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">Amount (₹)</label>
            <div class="relative">
              <span class="absolute left-5 top-1/2 -translate-y-1/2 font-black text-slate-400">₹</span>
              <input id="recurring-amount" type="number" name="amount" [(ngModel)]="recurring.amount" required min="1" placeholder="0.00" 
                     class="w-full pl-12 pr-6 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-emerald-500/20 text-sm font-bold text-slate-700">
            </div>
          </div>

          <!-- Category Selection -->
          <div class="space-y-3">
            <label for="recurring-category" class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">Category</label>
            <div class="relative">
              <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-rounded text-slate-400">category</span>
              <select id="recurring-category" name="categoryId" [(ngModel)]="recurring.categoryId" required
                      class="w-full pl-14 pr-6 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-emerald-500/20 text-sm font-bold text-slate-700 appearance-none">
                <option [ngValue]="undefined" disabled>Select a category</option>
                <option *ngFor="let cat of getFilteredCategories()" [ngValue]="cat.categoryId">
                  {{ cat.icon }} {{ cat.name }}
                </option>
              </select>
            </div>
          </div>

          <!-- Frequency -->
          <div class="space-y-3">
            <label for="recurring-frequency" class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">Frequency</label>
            <div class="relative">
              <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-rounded text-slate-400">event_repeat</span>
              <select id="recurring-frequency" name="frequency" [(ngModel)]="recurring.frequency" required
                      class="w-full pl-14 pr-6 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-emerald-500/20 text-sm font-bold text-slate-700 appearance-none">
                <option value="DAILY">Daily</option>
                <option value="WEEKLY">Weekly</option>
                <option value="MONTHLY">Monthly</option>
                <option value="YEARLY">Yearly</option>
              </select>
            </div>
          </div>
          
          <!-- Start Date -->
          <div class="space-y-3">
            <label for="recurring-start-date" class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">Start Date</label>
            <div class="relative">
              <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-rounded text-slate-400">today</span>
              <input id="recurring-start-date" type="date" name="startDate" [(ngModel)]="recurring.startDate" required 
                     class="w-full pl-14 pr-6 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-emerald-500/20 text-sm font-bold text-slate-700">
            </div>
          </div>

          <!-- End Date -->
          <div class="space-y-3">
            <label for="recurring-end-date" class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">End Date (Optional)</label>
            <div class="relative">
              <span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-rounded text-slate-400">event_busy</span>
              <input id="recurring-end-date" type="date" name="endDate" [(ngModel)]="recurring.endDate" 
                     class="w-full pl-14 pr-6 py-4 rounded-2xl bg-slate-50 border-none focus:ring-2 focus:ring-emerald-500/20 text-sm font-bold text-slate-700">
            </div>
          </div>
          
          <!-- Payment Method -->
          <div class="space-y-3 md:col-span-2">
            <span class="block text-[10px] font-black text-slate-400 uppercase tracking-[0.2em] px-2">Payment Method</span>
            <div class="grid grid-cols-2 sm:grid-cols-4 gap-3">
              <label *ngFor="let method of ['CARD', 'CASH', 'UPI', 'BANK']" class="cursor-pointer">
                <input type="radio" name="paymentMethod" [(ngModel)]="recurring.paymentMethod" [value]="method" class="peer sr-only">
                <div class="px-4 py-3 text-center border-2 border-slate-100 rounded-xl font-bold text-xs text-slate-400 peer-checked:border-emerald-500 peer-checked:text-emerald-600 peer-checked:bg-emerald-50 transition-all">
                  {{ method }}
                </div>
              </label>
            </div>
          </div>

        </div>

        <button type="submit" [disabled]="!recurringForm.form.valid || loading()" 
                class="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-4 px-8 rounded-2xl shadow-lg dark:shadow-slate-400/40 transition-all flex items-center justify-center space-x-2 disabled:opacity-50 disabled:cursor-not-allowed">
          <span *ngIf="loading()" class="material-symbols-rounded animate-spin">progress_activity</span>
          <span *ngIf="!loading()" class="material-symbols-rounded">check_circle</span>
          <span>{{ isEditMode ? 'Save Changes' : 'Start Automation' }}</span>
        </button>
      </form>
    </div>
  </div>
</div>
