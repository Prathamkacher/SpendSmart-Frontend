<div class="p-4 md:p-8 max-w-7xl mx-auto min-h-screen bg-slate-50 dark:bg-slate-950 transition-colors duration-500">
  <!-- Header -->
  <div class="mb-10">
    <div class="flex items-center justify-between mb-4">
      <div>
        <h1 class="text-4xl font-black tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-slate-900 to-slate-600 dark:from-white dark:to-slate-400 mb-2">Schedule</h1>
        <p class="text-sm font-medium text-slate-500 dark:text-slate-400">Your financial roadmap for the weeks ahead.</p>
      </div>
      <button routerLink="/recurring/add"
        class="bg-emerald-600 hover:bg-emerald-700 text-white px-6 py-3.5 rounded-2xl font-bold shadow-lg dark:shadow-emerald-400/50 dark:shadow-emerald-900/20 hover:shadow-xl hover:-translate-y-0.5 transition-all flex items-center space-x-2">
        <span class="material-symbols-rounded text-xl">add_circle</span>
        <span>New Rule</span>
      </button>
    </div>
    
    <!-- View Toggles (List vs Calendar) -->
    <div class="flex items-center space-x-2 bg-white dark:bg-slate-900 p-1.5 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-800 inline-flex">
      <button routerLink="/recurring" class="px-6 py-2.5 rounded-xl text-sm font-bold text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">
        <span class="material-symbols-rounded text-[20px] align-middle mr-2">list</span>List View
      </button>
      <button class="px-6 py-2.5 rounded-xl text-sm font-black bg-slate-900 dark:bg-emerald-600 text-white shadow-lg transition-all">
        <span class="material-symbols-rounded text-[20px] align-middle mr-2">calendar_month</span>Calendar
      </button>
    </div>
  </div>

  <div class="bg-white dark:bg-slate-900 rounded-[3rem] border border-slate-100 dark:border-slate-800 shadow-2xl overflow-hidden transition-all duration-500">
    <!-- Calendar Header -->
    <div class="p-10 border-b border-slate-50 dark:border-slate-800 flex items-center justify-between bg-slate-50/30 dark:bg-slate-800/20">
      <h2 class="text-3xl font-black text-slate-800 dark:text-white tracking-tight">{{ currentDate | date:'MMMM yyyy' }}</h2>
      <div class="flex items-center space-x-3">
        <button (click)="prevMonth()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 hover:text-emerald-600 dark:hover:text-emerald-400 transition-all shadow-sm active:scale-90">
          <span class="material-symbols-rounded">chevron_left</span>
        </button>
        <button (click)="nextMonth()" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-700 hover:text-emerald-600 dark:hover:text-emerald-400 transition-all shadow-sm active:scale-90">
          <span class="material-symbols-rounded">chevron_right</span>
        </button>
      </div>
    </div>

    <!-- Calendar Grid -->
    <div class="p-8">
      <!-- Weekdays -->
      <div class="grid grid-cols-7 mb-6">
        <div *ngFor="let day of weekDays" class="text-center text-[10px] font-black text-slate-400 dark:text-slate-500 uppercase tracking-widest pb-4">
          {{ day }}
        </div>
      </div>
      
      <!-- Days -->
      <div class="grid grid-cols-7 gap-4">
        <div *ngFor="let day of calendarDays()" 
             class="min-h-[140px] p-4 border border-slate-100 dark:border-slate-800 rounded-[2rem] relative transition-all duration-300"
             [ngClass]="day.isCurrentMonth ? 'bg-white dark:bg-slate-900 hover:border-emerald-200 dark:hover:border-emerald-500/50 hover:shadow-xl group' : 'bg-slate-50/50 dark:bg-slate-800/30 opacity-30 pointer-events-none'">
          
          <div class="flex justify-between items-start mb-3">
            <span class="text-xs font-black w-8 h-8 flex items-center justify-center rounded-xl transition-all"
                  [ngClass]="(day.date | date:'shortDate') === (today | date:'shortDate') ? 'bg-emerald-600 text-white shadow-lg dark:shadow-emerald-400/50 dark:shadow-none scale-110' : 'text-slate-500 dark:text-slate-400 group-hover:text-emerald-600'">
              {{ day.date | date:'d' }}
            </span>
          </div>

          <div class="space-y-2">
            <div *ngFor="let txn of day.transactions" 
                 [routerLink]="['/recurring/edit', txn.recurringId]"
                 class="px-3 py-2 rounded-xl text-[10px] font-black truncate cursor-pointer shadow-sm hover:scale-105 transition-all border border-transparent"
                 [ngClass]="txn.type === 'INCOME' ? 'bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 border-emerald-100/50 dark:border-emerald-500/20' : 'bg-rose-50 dark:bg-rose-500/10 text-rose-600 dark:text-rose-400 border-rose-100/50 dark:border-rose-500/20'"
                 title="{{txn.title}} - {{txn.amount | currency:'INR'}}">
              <span class="flex items-center">
                <span class="w-1.5 h-1.5 rounded-full mr-2" [class.bg-emerald-500]="txn.type === 'INCOME'" [class.bg-rose-500]="txn.type === 'EXPENSE'"></span>
                {{ txn.amount }} {{ txn.title }}
              </span>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
